name: Daily Weather Pipeline

on:
  schedule:
    - cron: '0 7 * * *'        # Runs every day at 7 AM UTC
  workflow_dispatch:             # Lets you manually trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./   # All steps run here

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python weather_data/main.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add models/champion/ outputs/ logs/
          git commit -m "Daily pipeline run" || echo "No changes"
          git push
